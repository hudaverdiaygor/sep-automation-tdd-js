name: Regression Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * *" # 6 PM EST
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        # The --headless flag is CRITICAL for GitHub Actions
        run: npx playwright test --headless
        env:
          SEP_USERNAME: ${{ secrets.SEP_USERNAME }}
          SEP_PASSWORD: ${{ secrets.SEP_PASSWORD }}
          SEP_QA_URL: ${{ secrets.SEP_QA_URL }}
          CARD_NUMBER: ${{ secrets.CARD_NUMBER }}
          CARD_EXPIRATION_DATE: ${{ secrets.CARD_EXPIRATION_DATE }}
          CARD_SECURITY_CODE: ${{ secrets.CARD_SECURITY_CODE }}
          ZIP_CODE: ${{ secrets.ZIP_CODE }}

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-cucumber-report
          path: |
            reports/
            test-results/
            playwright-report/
          retention-days: 30
