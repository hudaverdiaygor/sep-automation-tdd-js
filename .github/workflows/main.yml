name: Regression Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * *" # 6 PM EST
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Configure environment variables
        run: |
          echo "SEP_USERNAME=${{ secrets.SEP_USERNAME }}" >> $GITHUB_ENV
          echo "SEP_PASSWORD=${{ secrets.SEP_PASSWORD }}" >> $GITHUB_ENV
          echo "SEP_QA_URL=${{ secrets.SEP_QA_URL }}" >> $GITHUB_ENV
          echo "CARD_NUMBER=${{ secrets.CARD_NUMBER }}" >> $GITHUB_ENV
          echo "CARD_EXPIRATION_DATE=${{ secrets.CARD_EXPIRATION_DATE }}" >> $GITHUB_ENV
          echo "CARD_SECURITY_CODE=${{ secrets.CARD_SECURITY_CODE }}" >> $GITHUB_ENV
          echo "ZIP_CODE=${{ secrets.ZIP_CODE }}" >> $GITHUB_ENV

      - name: Run Playwright tests
        run: npm test # Ensure this matches the script name in package.json

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-cucumber-report
          # Update this path to match your config (e.g., 'playwright-report/' or 'cucumber-report.html')
          path: |
            reports/
            test-results/
            playwright-report/
          retention-days: 30
